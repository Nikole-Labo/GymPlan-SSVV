<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4">
                <h1 class="h4 mb-4" th:text="${formTitle}">Customer Form</h1>
                <form th:action="${customer.id} != null ? @{/customers/{id}(id=${customer.id})} : @{/customers}"
                      th:object="${customer}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="firstName">First Name</label>
                        <input id="firstName" class="form-control" th:field="*{firstName}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="lastName">Last Name</label>
                        <input id="lastName" class="form-control" th:field="*{lastName}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">Email</label>
                        <input id="email" type="email" class="form-control" th:field="*{email}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="registrationDate">Registration Date</label>
                        <input id="registrationDate" type="date" class="form-control" th:field="*{registrationDate}"/>
                        <div class="form-text">Used in reports to identify new vs. returning customers.</div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('registrationDate')}" th:errors="*{registrationDate}"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a th:href="@{/customers}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
