<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Customers')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div th:replace="~{fragments/layout :: alerts}"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Customers</h1>
        <a th:href="@{/customers/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Customer</a>
    </div>
    <div class="card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Registration Date</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer : ${customers}">
                    <td th:text="${customer.id}"></td>
                    <td th:text="${customer.fullName}"></td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${#temporals.format(customer.registrationDate, 'dd MMM yyyy')}"></td>
                    <td class="text-end text-nowrap">
                        <a th:href="@{/customers/{id}/edit(id=${customer.id})}" class="btn btn-sm btn-outline-secondary">Edit</a>
                        <form th:action="@{/customers/{id}/delete(id=${customer.id})}" method="post" class="d-inline"
                              onsubmit="return confirm('Delete this customer?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(customers)}">
                    <td colspan="5" class="text-center text-muted py-4">No customers yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
