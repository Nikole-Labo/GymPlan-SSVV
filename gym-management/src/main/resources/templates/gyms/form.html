<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${formTitle})}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4">
                <h1 class="h4 mb-4" th:text="${formTitle}">Gym Form</h1>
                <form th:action="${gym.id} != null ? @{/gyms/{id}(id=${gym.id})} : @{/gyms}"
                      th:object="${gym}" method="post">
                    <div class="mb-3">
                        <label class="form-label" for="name">Name</label>
                        <input id="name" class="form-control" th:field="*{name}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="address">Address</label>
                        <input id="address" class="form-control" th:field="*{address}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="capacity">Capacity (max active subscriptions)</label>
                        <input id="capacity" type="number" min="1" class="form-control" th:field="*{capacity}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="managerName">Manager Name</label>
                        <input id="managerName" class="form-control" th:field="*{managerName}"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('managerName')}" th:errors="*{managerName}"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a th:href="@{/gyms}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
